name: Unpack site source

on:
  push:
    paths:
      - academic-site-source.tar.gz

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Unpack website source
        run: |
          if [ ! -f academic-site-source.tar.gz ]; then
            exit 0
          fi
          tar -xzf academic-site-source.tar.gz
          rm academic-site-source.tar.gz
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Publish Zertteu Lab website source"
          git push
